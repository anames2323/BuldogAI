<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hugging Face Chat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a, #1e293b);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat {
            width: 100%;
            max-width: 750px;
            height: 90vh;
            background: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }
        
        .header {
            padding: 20px 24px;
            background: rgba(15, 23, 42, 0.6);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #f59e0b, #ef4444);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 20px;
            box-shadow: 0 8px 16px rgba(245, 158, 11, 0.3);
        }
        
        .header h2 { color: white; font-size: 18px; font-weight: 600; }
        
        .badge {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            margin-left: 8px;
        }
        
        .messages {
            flex: 1; overflow-y: auto; padding: 24px;
            display: flex; flex-direction: column; gap: 16px;
        }
        
        .msg {
            display: flex; gap: 10px;
            animation: slide 0.3s ease;
        }
        @keyframes slide {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .msg.user { flex-direction: row-reverse; }
        
        .avatar {
            width: 32px; height: 32px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            color: white; font-size: 14px; flex-shrink: 0;
        }
        .msg.user .avatar { background: #475569; }
        .msg.bot .avatar { background: linear-gradient(135deg, #f59e0b, #ef4444); }
        
        .bubble {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 18px;
            line-height: 1.5; font-size: 14px;
            word-wrap: break-word; white-space: pre-wrap;
        }
        .msg.user .bubble {
            background: #3b82f6; color: white;
            border-bottom-right-radius: 4px;
        }
        .msg.bot .bubble {
            background: rgba(255,255,255,0.06); color: #e2e8f0;
            border: 1px solid rgba(255,255,255,0.1);
            border-bottom-left-radius: 4px;
        }
        
        .typing { display: flex; gap: 4px; padding: 8px 0; }
        .typing span {
            width: 6px; height: 6px;
            background: #94a3b8; border-radius: 50%;
            animation: bounce 1.4s infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%,60%,100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }
        
        .input-area {
            padding: 16px 24px 20px;
            background: rgba(15,23,42,0.5);
            border-top: 1px solid rgba(255,255,255,0.08);
        }
        
        .input-wrap {
            display: flex; gap: 8px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 6px 6px 6px 18px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .input-wrap:focus-within { border-color: #f59e0b; }
        
        #userInput {
            flex: 1; background: transparent; border: none;
            color: #f1f5f9; font-size: 14px; outline: none;
            font-family: 'Inter', sans-serif;
        }
        #userInput::placeholder { color: #64748b; }
        
        #sendBtn {
            background: #f59e0b; border: none; color: white;
            width: 42px; height: 42px; border-radius: 12px;
            cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        #sendBtn:hover { background: #d97706; }
        #sendBtn:disabled { background: #475569; cursor: not-allowed; }
        
        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1); border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="chat">
        <div class="header">
            <div class="header-icon">🤗</div>
            <h2>Hugging Face Chat</h2>
            <span class="badge">Mistral-7B</span>
        </div>
        
        <div class="messages" id="messages">
            <div class="msg bot">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    👋 Привет! Я работаю через Hugging Face API (бесплатно). 
                    Использую модель Mistral-7B. Задавайте вопросы!
                </div>
            </div>
        </div>
        
        <div class="input-area">
            <div class="input-wrap">
                <input type="text" id="userInput" placeholder="Введите сообщение..." maxlength="2000">
                <button id="sendBtn">➤</button>
            </div>
        </div>
    </div>

    <script>
        // Бесплатный Hugging Face API — не требует ключа для базовых моделей
        // Если хотите больше запросов, получите токен на huggingface.co/settings/tokens
        const HF_TOKEN = ''; // Оставьте пустым для бесплатного доступа
        
        // Модели для перебора (бесплатные)
        const MODELS = [
            'mistralai/Mistral-7B-Instruct-v0.2',
            'microsoft/Phi-3-mini-4k-instruct',
            'google/gemma-2b-it',
            'facebook/blenderbot-400M-distill'
        ];
        
        let currentModelIndex = 0;
        
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        
        // История чата
        let chatHistory = '';
        
        function addMessage(role, text) {
            const div = document.createElement('div');
            div.className = `msg ${role}`;
            div.innerHTML = `
                <div class="avatar">${role === 'user' ? '👤' : '🤖'}</div>
                <div class="bubble">${text}</div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTyping() {
            const div = document.createElement('div');
            div.className = 'msg bot';
            div.id = 'typing';
            div.innerHTML = `
                <div class="avatar">🤖</div>
                <div class="bubble">
                    <div class="typing"><span></span><span></span><span></span></div>
                </div>
            `;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function hideTyping() {
            const el = document.getElementById('typing');
            if (el) el.remove();
        }
        
        async function queryHF(prompt) {
            const model = MODELS[currentModelIndex];
            const API_URL = `https://api-inference.huggingface.co/models/${model}`;
            
            const headers = { 'Content-Type': 'application/json' };
            if (HF_TOKEN) {
                headers['Authorization'] = `Bearer ${HF_TOKEN}`;
            }
            
            // Формируем промпт для instruct-моделей
            const formattedPrompt = `<s>[INST] ${prompt} [/INST]`;
            
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({
                    inputs: chatHistory ? chatHistory + '\n' + formattedPrompt : formattedPrompt,
                    parameters: {
                        max_new_tokens: 500,
                        temperature: 0.7,
                        return_full_text: false
                    }
                })
            });
            
            if (response.status === 503) {
                // Модель загружается, пробуем следующую
                throw new Error('MODEL_LOADING');
            }
            
            if (!response.ok) {
                const error = await response.json();
                throw new Error(error.error || `HTTP ${response.status}`);
            }
            
            const data = await response.json();
            
            // Разные модели возвращают разный формат
            let text = '';
            if (Array.isArray(data)) {
                text = data[0]?.generated_text || '';
            } else if (data.generated_text) {
                text = data.generated_text;
            } else {
                text = JSON.stringify(data);
            }
            
            return text;
        }
        
        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message) return;
            
            userInput.disabled = true;
            sendBtn.disabled = true;
            
            addMessage('user', message);
            userInput.value = '';
            
            showTyping();
            
            try {
                let reply = '';
                
                // Пробуем текущую модель, если не грузится — следующую
                for (let i = 0; i < MODELS.length; i++) {
                    try {
                        reply = await queryHF(message);
                        break;
                    } catch (e) {
                        if (e.message === 'MODEL_LOADING') {
                            currentModelIndex = (currentModelIndex + 1) % MODELS.length;
                            document.querySelector('.badge').textContent = 
                                MODELS[currentModelIndex].split('/')[1];
                            continue;
                        }
                        throw e;
                    }
                }
                
                hideTyping();
                
                if (reply) {
                    addMessage('bot', reply);
                    // Обновляем историю
                    chatHistory += `\nUser: ${message}\nAssistant: ${reply}`;
                } else {
                    addMessage('bot', 'Все модели сейчас недоступны. Попробуйте позже.');
                }
                
            } catch (error) {
                hideTyping();
                addMessage('bot', `❌ Ошибка: ${error.message}`);
            }
            
            userInput.disabled = false;
            sendBtn.disabled = false;
            userInput.focus();
        }
        
        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                sendMessage();
            }
        });
    </script>
</body>
</html>
